---
- name: Enabling net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: "net.ipv4.ip_forward"
    value: "1"
    state: present
    sysctl_set: true
    reload: true
    sysctl_file: "/etc/sysctl.d/{{ prefix_type }}.conf"

- name: Add nf_conntrack and br_netfilter kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop: "{{ kernel_modules }}" # present in group_vars
