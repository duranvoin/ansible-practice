---
- name: Systemd daemon-reload after add containerd unit
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: "containerd.service"
    state: started
    enabled: true

- name: Systemd daemon-reload after add kubelet unit
  ansible.builtin.systemd_service:
    daemon_reload: true
    name: "kubelet.service"
    state: started
    enabled: true
